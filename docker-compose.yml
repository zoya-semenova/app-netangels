version: "3"

services:
  webserver:
   # image: httpd:latest # Or an image with Apache and PHP pre-installed
    build:
      #context: ./bin/${PHPVERSION}/www/nuxt
     context: ./bin/${PHPVERSION}/www
     # context: ./bin/${PHPVERSION}
      #context: \\wsl.localhost\Ubuntu\home\zoya\aka-lamer-localhost-5c59b39fc75f\aka-lamer-localhost-5c59b39fc75f\bin\php74\www\nuxt
    container_name: '${COMPOSE_PROJECT_NAME}-${PHPVERSION}'
    restart: 'always'
    ports:
      - "${HOST_MACHINE_UNSECURE_HOST_PORT}:8080"
      - "${HOST_MACHINE_SECURE_HOST_PORT}:4433"
      - "3000:3000"
      - "3002:3002"
      #- 24678:24678
    expose:
      - '3000'
      - '3002'
    links: 
      - database
      - maildev:maildev
    volumes: 
      - ${DOCUMENT_ROOT}:/var/www/html
      - ${APP_ROOT}:/var/www/html
      - ${PHP_INI-./config/php/php.ini}:/usr/local/etc/php/php.ini
      - ${VHOSTS_DIR-./config/vhosts}:/etc/apache2/sites-enabled
      - ${LOG_DIR-./logs/apache2}:/var/log/apache2
    environment:
      PMA_PORT: ${HOST_MACHINE_PMA_PORT}
      REDIS_HOST: ${HOST_MACHINE_REDIS}
      APP_ROOT: ${APP_ROOT}
      CHOKIDAR_USEPOLLING: true
    networks:
      - app-network

  database:
    image: theonesrl/lamp_db
    build:
      context: "./bin/${DATABASE}"
    container_name: '${COMPOSE_PROJECT_NAME}-database'
    restart: 'always'
    ports:
      - "127.0.0.1:${HOST_MACHINE_MYSQL_PORT}:3307"
    volumes: 
      - ${MYSQL_CONFIG-./config/db/my.cnf}:/etc/mysql/my.cnf
      - ${MYSQL_DATA_DIR-./data/mysql}:/var/lib/mysql
      - ${MYSQL_LOG_DIR-./logs/mysql}:/var/log/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: '${COMPOSE_PROJECT_NAME}-phpmyadmin'
    links:
      - database
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - '${HOST_MACHINE_PMA_PORT}:8081'
    volumes: 
      - /sessions
      - ${PHP_INI-./config/php/php.ini}:/usr/local/etc/php/conf.d/php-phpmyadmin.ini
  redis:
    container_name: '${COMPOSE_PROJECT_NAME}-redis'
    image: redis:latest
    ports:
      - "127.0.0.1:${HOST_MACHINE_REDIS_PORT}:6379"
  maildev:
    image: djfarrelly/maildev
    ports:
      - 8282:80
